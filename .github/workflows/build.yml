name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-13
            artifact: macos-x64
          - os: macos-latest
            artifact: macos-arm64
          - os: windows-latest
            artifact: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r 源码/requirements.txt
          pip install pyinstaller

      - name: Build macOS app
        if: runner.os == 'macOS'
        run: |
          pyinstaller --name="QQ相册下载工具" --windowed --onedir --noconfirm --clean 源码/qq_photo_v4.py
          cd dist && zip -r "../qq-album-downloader-${{ matrix.artifact }}.zip" "QQ相册下载工具.app"

      - name: Build Windows exe
        if: runner.os == 'Windows'
        run: |
          pyinstaller --name="QQ相册下载工具" --windowed --onedir --noconfirm --clean 源码/qq_photo_v4.py
          Compress-Archive -Path "dist/QQ相册下载工具/*" -DestinationPath "qq-album-downloader-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qq-album-downloader-${{ matrix.artifact }}
          path: |
            qq-album-downloader-${{ matrix.artifact }}.zip
            qq-album-downloader-windows.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: qq-album-downloader-*
          path: release-assets

      - name: Generate release notes
        id: notes
        run: |
          LAST_TAG=$(git tag --sort=-creatordate | head -1)
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          echo "## 📝 更新内容" > /tmp/notes.md
          echo "" >> /tmp/notes.md
          git log $RANGE --pretty=format:"- %s (%h)" --no-merges >> /tmp/notes.md || echo "- 初始版本" >> /tmp/notes.md
          echo "" >> /tmp/notes.md
          echo "---" >> /tmp/notes.md
          echo "**构建时间:** $(date '+%Y-%m-%d %H:%M')" >> /tmp/notes.md
          cat /tmp/notes.md
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create or update latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest \
            --title "QQ相册下载工具 - 最新版" \
            --notes-file /tmp/notes.md \
            $(find release-assets -name '*.zip')
          echo "✅ Release created"
